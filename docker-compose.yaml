---
services:
  postgres:
    image: postgres:16-alpine
    container_name: animus_postgres
    restart: unless-stopped
    env_file: [.env]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports: [5432:5432]
    volumes: [animus_postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
  qdrant:
    image: qdrant/qdrant:latest
    container_name: animus_qdrant
    restart: unless-stopped
    ports: [6333:6333, 6334:6334]
    volumes: [animus_qdrant_data:/qdrant/storage]
  inngest:
    image: inngest/inngest:v0.27.0
    container_name: animus_inngest
    command: inngest dev -u http://host.docker.internal:8080/api/inngest
    ports: [8288:8288]
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    extra_hosts: [host.docker.internal:host-gateway]
  redis:
    image: redis:7-alpine
    container_name: animus_redis
    restart: unless-stopped
    command: [redis-server, --appendonly, yes]
    ports: [6379:6379]
    volumes: [animus_redis_data:/data]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  animus_postgres_data:
  animus_qdrant_data:
  animus_redis_data:

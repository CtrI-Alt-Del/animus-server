services:
  postgres:
    image: postgres:16-alpine
    container_name: animus_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - animus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  inngest:
    image: inngest/inngest:v0.27.0
    container_name: animus_inngest
    command: "inngest dev -u http://host.docker.internal:8080/api/inngest"
    ports:
      - "8288:8288"
    depends_on:
      - postgres

volumes:
  animus_postgres_data:

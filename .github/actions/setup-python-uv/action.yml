name: "Setup Python + uv"
description: "Sets up Python and uv, then installs dependencies with uv sync"

inputs:
  python-version:
    description: "Python version to install"
    required: false
    default: "3.13"

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Setup uv
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --all-groups --frozen

name: Automate Versioning and Release

on:
  push:
    branches:
      - main 

permissions:
  contents: write 
  issues: write   
  pull-requests: write

jobs:
  release:
    name: Generate Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js (necessário para rodar o semantic-release)
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Executar Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --yes semantic-release
